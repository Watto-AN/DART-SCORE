<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dart Scorer</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Manifest details for mobile full-screen app compliance -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-4">

    <!-- Config Screen -->
    <div id="setup-screen" class="max-w-md mx-auto w-full bg-slate-800 p-6 rounded-2xl shadow-xl mt-10">
        <h1 class="text-3xl font-black text-center mb-6 text-emerald-400">DART SCORER</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-2">Game Variant</label>
                <select id="start-score" class="w-full bg-slate-700 border border-slate-600 rounded-xl p-3 text-lg font-bold">
                    <option value="501">501</option>
                    <option value="301">301</option>
                    <option value="701">701</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Number of Players</label>
                <select id="player-count" class="w-full bg-slate-700 border border-slate-600 rounded-xl p-3 text-lg font-bold">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4">4 Players</option>
                </select>
            </div>
            <button onclick="startGame()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-black py-4 rounded-xl text-xl mt-6 transition-all shadow-lg shadow-emerald-500/20">
                START MATCH
            </button>
        </div>
    </div>

    <!-- Game Screen (Hidden Initially) -->
    <div id="game-screen" class="hidden w-full max-w-md mx-auto flex-1 flex flex-col justify-between">
        <!-- Scoreboard Header -->
        <div id="scoreboard" class="grid gap-2 mb-4"></div>

        <!-- Inputs and Pad Structure -->
        <div class="mt-auto space-y-3">
            <!-- Current Turn Display -->
            <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center px-4">
                <span class="text-slate-400 font-medium">Turn Total:</span>
                <span id="current-input" class="text-3xl font-black text-amber-400">0</span>
            </div>

            <!-- Custom Numeric Entry Pad -->
            <div class="grid grid-cols-4 gap-2">
                <button onclick="addValue(20)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">20</button>
                <button onclick="addValue(19)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">19</button>
                <button onclick="addValue(18)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">18</button>
                <button onclick="addValue(17)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">17</button>
                
                <button onclick="addValue(16)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">16</button>
                <button onclick="addValue(15)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">15</button>
                <button onclick="addValue(14)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">14</button>
                <button onclick="addValue(13)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">13</button>

                <button onclick="addValue(12)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">12</button>
                <button onclick="addValue(11)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">11</button>
                <button onclick="addValue(10)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">10</button>
                <button onclick="addValue(9)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">9</button>

                <button onclick="addValue(8)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">8</button>
                <button onclick="addValue(7)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">7</button>
                <button onclick="addValue(6)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">6</button>
                <button onclick="addValue(5)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">5</button>

                <button onclick="addValue(4)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">4</button>
                <button onclick="addValue(3)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">3</button>
                <button onclick="addValue(2)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">2</button>
                <button onclick="addValue(1)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">1</button>

                <button onclick="addValue(25)" class="bg-slate-800 p-4 rounded-xl text-lg font-bold active:bg-slate-700">Outer</button>
                <button onclick="addValue(50)" class="bg-slate-700 p-4 rounded-xl text-lg font-bold text-red-400 active:bg-slate-600">Bull</button>
                <button onclick="addValue(0)" class="bg-slate-800 p-4 rounded-xl text-xl font-bold active:bg-slate-700">0</button>
                <button onclick="clearCurrent()" class="bg-red-900/40 text-red-400 p-4 rounded-xl text-lg font-bold active:bg-red-900/60">Clear</button>
            </div>

            <!-- Action Confirm Row -->
            <button onclick="submitTurn()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-black py-4 rounded-xl text-xl transition-all shadow-lg">
                SUBMIT SCORE
            </button>
        </div>
    </div>

    <!-- Core App Engine -->
    <script>
        let players = [];
        let activePlayerIndex = 0;
        let baseStartingScore = 501;
        let currentTurnPoints = 0;

        function startGame() {
            baseStartingScore = parseInt(document.getElementById('start-score').value);
            const count = parseInt(document.getElementById('player-count').value);
            
            players = [];
            for (let i = 1; i <= count; i++) {
                players.push({
                    id: i,
                    name: `Player ${i}`,
                    score: baseStartingScore,
                    legs: 0
                });
            }
            activePlayerIndex = 0;
            currentTurnPoints = 0;

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderScoreboard();
        }

        function renderScoreboard() {
            const container = document.getElementById('scoreboard');
            container.innerHTML = '';

            players.forEach((player, idx) => {
                const isActive = idx === activePlayerIndex;
                const card = document.createElement('div');
                card.className = `p-4 rounded-xl flex justify-between items-center transition-all border ${
                    isActive ? 'bg-slate-800 border-emerald-500 shadow-md shadow-emerald-500/10 scale-102' : 'bg-slate-800/50 border-slate-700'
                }`;

                card.innerHTML = `
                    <div>
                        <div class="font-bold text-lg ${isActive ? 'text-emerald-400' : 'text-slate-300'}">${player.name}</div>
                        <div class="text-xs text-slate-400">Legs won: ${player.legs}</div>
                    </div>
                    <div class="text-4xl font-black ${isActive ? 'text-white' : 'text-slate-400'}">${player.score}</div>
                `;
                container.appendChild(card);
            });
        }

        function addValue(val) {
            // A simple logic wrapper to calculate input sum per turn
            // Allows safe terminal number pad accumulation up to a valid maximum 3-dart score (180)
            if (currentTurnPoints + val <= 180) {
                currentTurnPoints += val;
                document.getElementById('current-input').innerText = currentTurnPoints;
            }
        }

        function clearCurrent() {
            currentTurnPoints = 0;
            document.getElementById('current-input').innerText = currentTurnPoints;
        }

        function submitTurn() {
            let p = players[activePlayerIndex];
            let testScore = p.score - currentTurnPoints;

            if (testScore === 0) {
                alert(`${p.name} wins the leg!`);
                p.legs += 1;
                resetLegs();
                return;
            } else if (testScore < 2) {
                // Standard '01 rule: going below 0 or landing exactly on 1 is a bust (cannot double out)
                alert("Bust!");
            } else {
                p.score = testScore;
            }

            currentTurnPoints = 0;
            document.getElementById('current-input').innerText = currentTurnPoints;
            
            // Advance player rotation
            activePlayerIndex = (activePlayerIndex + 1) % players.length;
            renderScoreboard();
        }

        function resetLegs() {
            players.forEach(p => p.score = baseStartingScore);
            activePlayerIndex = 0;
            clearCurrent();
            renderScoreboard();
        }
    </script>
</body>
</html>
