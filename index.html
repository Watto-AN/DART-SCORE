<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Dart Scorer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        /* Custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        .touch-action-manipulation {
            touch-action: manipulation;
        }
    </style>
</head>
<body class="h-full flex flex-col font-sans overflow-x-hidden">

    <!-- Top Navigation / Header -->
    <header class="bg-slate-900 border-b border-slate-800 px-4 py-3 flex items-center justify-between shrink-0 shadow-lg">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-slate-950 font-black text-lg">
                🎯
            </div>
            <span class="font-bold text-lg tracking-wider text-slate-100">DART<span class="text-emerald-400">SCORE</span></span>
        </div>
        <div class="flex items-center space-x-2">
            <button id="btn-stats" onclick="toggleStatsModal()" class="hidden px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-sm font-medium transition flex items-center gap-1.5">
                <i class="fa-solid fa-chart-simple"></i>
                <span>Stats</span>
            </button>
            <button id="btn-new-game" onclick="confirmResetGame()" class="hidden px-3 py-1.5 bg-rose-500/20 hover:bg-rose-500/30 text-rose-400 border border-rose-500/30 rounded-lg text-sm font-medium transition flex items-center gap-1.5">
                <i class="fa-solid fa-rotate-left"></i>
                <span>Reset</span>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-1 flex flex-col justify-between max-w-md w-full mx-auto p-3 overflow-y-auto">

        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="my-auto bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-2xl space-y-6">
            <div class="text-center space-y-1">
                <h1 class="text-2xl font-black tracking-tight text-emerald-400">NEW MATCH</h1>
                <p class="text-xs text-slate-400">Configure game settings & players</p>
            </div>

            <!-- Game Variant / Starting Score -->
            <div class="space-y-2">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Starting Score</label>
                <div class="grid grid-cols-4 gap-2 mb-2">
                    <button type="button" onclick="setPresetScore(301, event)" class="preset-btn bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-bold py-2.5 rounded-xl transition text-sm">301</button>
                    <button type="button" onclick="setPresetScore(501, event)" class="preset-btn bg-emerald-500 text-slate-950 font-bold py-2.5 rounded-xl transition text-sm">501</button>
                    <button type="button" onclick="setPresetScore(701, event)" class="preset-btn bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-bold py-2.5 rounded-xl transition text-sm">701</button>
                    <button type="button" onclick="enableCustomScore()" class="preset-btn bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-bold py-2.5 rounded-xl transition text-sm">Custom</button>
                </div>
                <!-- Manual / Custom Score Input -->
                <div class="relative">
                    <input type="number" id="custom-score-input" min="2" max="9999" value="501" 
                        class="w-full bg-slate-950 border border-slate-800 focus:border-emerald-500 focus:outline-none rounded-xl py-2.5 px-4 text-center font-black text-xl text-emerald-400 transition"
                        placeholder="e.g. 101, 401, 601">
                    <span class="absolute right-3 top-2.5 text-xs text-slate-500 font-medium pointer-events-none">Pts</span>
                </div>
            </div>

            <!-- Player Setup -->
            <div class="space-y-3">
                <div class="flex items-center justify-between">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Players</label>
                    <div class="flex items-center space-x-1">
                        <button type="button" onclick="adjustPlayerCount(-1)" class="w-7 h-7 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg font-bold flex items-center justify-center text-sm">-</button>
                        <span id="player-count-display" class="w-6 text-center text-sm font-bold text-slate-200">2</span>
                        <button type="button" onclick="adjustPlayerCount(1)" class="w-7 h-7 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg font-bold flex items-center justify-center text-sm">+</button>
                    </div>
                </div>

                <div id="player-inputs-container" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                    <!-- Dynamic player input rows populated here -->
                </div>
            </div>

            <!-- Sets & Finish Rules Config -->
            <div class="grid grid-cols-2 gap-3 pt-2">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Legs to Win</label>
                    <select id="legs-to-win" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm font-bold text-slate-200 focus:outline-none focus:border-emerald-500">
                        <option value="1">First to 1</option>
                        <option value="3" selected>First to 3</option>
                        <option value="5">First to 5</option>
                        <option value="7">First to 7</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Finish Rule</label>
                    <button type="button" id="btn-double-out-toggle" onclick="toggleDoubleOut()" class="w-full bg-emerald-500/20 border border-emerald-500/50 rounded-xl p-2.5 text-xs font-bold text-emerald-400 flex items-center justify-center h-[42px] transition hover:bg-emerald-500/30">
                        <span id="double-out-text">Double Out</span>
                        <i id="double-out-icon" class="fa-solid fa-check ml-1.5 text-xs"></i>
                    </button>
                </div>
            </div>

            <button onclick="startGame()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black py-4 rounded-xl text-lg transition-all shadow-lg shadow-emerald-500/20 active:scale-[0.98]">
                START MATCH
            </button>
        </div>

        <!-- GAME SCREEN (Hidden initially) -->
        <div id="game-screen" class="hidden flex-1 flex flex-col justify-between space-y-3">
            
            <!-- Scoreboard Grid -->
            <div id="scoreboard-list" class="space-y-2">
                <!-- Player Score Cards injected here -->
            </div>

            <!-- Current Turn & Checkout Area -->
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-3 shadow-xl space-y-2">
                <!-- Checkout Suggestion / Rule Badge -->
                <div id="checkout-container" class="min-h-[28px] flex items-center justify-between px-2 text-xs border-b border-slate-800/80 pb-2">
                    <span class="text-slate-400 font-medium flex items-center gap-1">
                        <i class="fa-solid fa-bullseye text-emerald-400"></i> Checkout:
                    </span>
                    <span id="checkout-route" class="font-bold text-emerald-400 tracking-wider text-sm">--</span>
                </div>

                <!-- Turn Darts Entry Slot Display -->
                <div class="flex items-center justify-between px-2">
                    <div class="flex space-x-2">
                        <div id="dart-slot-0" class="w-12 h-10 rounded-lg bg-slate-950 border border-slate-800 flex items-center justify-center font-extrabold text-sm text-slate-400">1st</div>
                        <div id="dart-slot-1" class="w-12 h-10 rounded-lg bg-slate-950 border border-slate-800 flex items-center justify-center font-extrabold text-sm text-slate-400">2nd</div>
                        <div id="dart-slot-2" class="w-12 h-10 rounded-lg bg-slate-950 border border-slate-800 flex items-center justify-center font-extrabold text-sm text-slate-400">3rd</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] uppercase font-bold text-slate-500 tracking-wider">Turn Sum</div>
                        <div id="turn-total" class="text-2xl font-black text-amber-400 leading-none">0</div>
                    </div>
                </div>
            </div>

            <!-- Keypad Controls & Modifiers -->
            <div class="space-y-2">
                <!-- Multipliers & Utility Bar -->
                <div class="grid grid-cols-4 gap-1.5">
                    <button id="mod-single" onclick="setMultiplier(1)" class="mod-btn py-2.5 rounded-xl font-bold text-xs uppercase bg-emerald-500 text-slate-950 shadow">
                        Single
                    </button>
                    <button id="mod-double" onclick="setMultiplier(2)" class="mod-btn py-2.5 rounded-xl font-bold text-xs uppercase bg-slate-800 text-slate-300 hover:bg-slate-700">
                        Double (D)
                    </button>
                    <button id="mod-triple" onclick="setMultiplier(3)" class="mod-btn py-2.5 rounded-xl font-bold text-xs uppercase bg-slate-800 text-slate-300 hover:bg-slate-700">
                        Triple (T)
                    </button>
                    <button onclick="undoDart()" class="bg-amber-500/20 border border-amber-500/30 text-amber-400 hover:bg-amber-500/30 py-2.5 rounded-xl font-bold text-xs uppercase flex items-center justify-center gap-1">
                        <i class="fa-solid fa-rotate-left"></i> Undo
                    </button>
                </div>

                <!-- Number Grid (1-20 + Bulls) -->
                <div class="grid grid-cols-5 gap-1.5 touch-action-manipulation">
                    <!-- Number 1 to 20 -->
                    <button onclick="enterDart(20)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">20</button>
                    <button onclick="enterDart(19)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">19</button>
                    <button onclick="enterDart(18)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">18</button>
                    <button onclick="enterDart(17)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">17</button>
                    <button onclick="enterDart(16)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">16</button>

                    <button onclick="enterDart(15)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">15</button>
                    <button onclick="enterDart(14)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">14</button>
                    <button onclick="enterDart(13)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">13</button>
                    <button onclick="enterDart(12)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">12</button>
                    <button onclick="enterDart(11)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">11</button>

                    <button onclick="enterDart(10)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">10</button>
                    <button onclick="enterDart(9)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">9</button>
                    <button onclick="enterDart(8)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">8</button>
                    <button onclick="enterDart(7)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">7</button>
                    <button onclick="enterDart(6)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">6</button>

                    <button onclick="enterDart(5)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">5</button>
                    <button onclick="enterDart(4)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">4</button>
                    <button onclick="enterDart(3)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">3</button>
                    <button onclick="enterDart(2)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">2</button>
                    <button onclick="enterDart(1)" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 active:text-white py-3 rounded-xl font-black text-lg text-slate-100 transition shadow">1</button>

                    <!-- Bottom Special Row -->
                    <button onclick="enterDart(0)" class="bg-slate-800/80 hover:bg-slate-700 py-3 rounded-xl font-bold text-sm text-slate-400">Miss (0)</button>
                    <button onclick="enterBull(25)" class="bg-slate-800/80 hover:bg-slate-700 py-3 rounded-xl font-bold text-xs text-amber-400">Outer (25)</button>
                    <button onclick="enterBull(50)" class="bg-slate-800/80 hover:bg-slate-700 py-3 rounded-xl font-bold text-xs text-rose-400">Bull (50)</button>
                    <button onclick="submitTurn()" class="col-span-2 bg-emerald-500 hover:bg-emerald-400 active:scale-[0.98] text-slate-950 py-3 rounded-xl font-black text-base transition shadow-lg flex items-center justify-center gap-1">
                        CONFIRM <i class="fa-solid fa-check text-sm"></i>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- STATS / HISTORY MODAL -->
    <div id="stats-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl p-5 shadow-2xl space-y-4 max-h-[85vh] flex flex-col">
            <div class="flex items-center justify-between border-b border-slate-800 pb-3">
                <h3 class="font-black text-lg text-slate-100 flex items-center gap-2">
                    <i class="fa-solid fa-chart-line text-emerald-400"></i> Match Statistics
                </h3>
                <button onclick="toggleStatsModal()" class="text-slate-400 hover:text-slate-200 p-1">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <div id="stats-content" class="flex-1 overflow-y-auto space-y-4 pr-1">
                <!-- Injected via JS -->
            </div>

            <button onclick="toggleStatsModal()" class="w-full bg-slate-800 hover:bg-slate-700 py-2.5 rounded-xl text-sm font-bold text-slate-200">
                Close
            </button>
        </div>
    </div>

    <!-- WINNER CELEBRATION MODAL -->
    <div id="winner-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-2xl p-6 shadow-2xl text-center space-y-5 animate-bounce-short">
            <div class="w-16 h-16 bg-amber-500/20 text-amber-400 border border-amber-500/30 rounded-full flex items-center justify-center mx-auto text-3xl">
                🏆
            </div>
            <div class="space-y-1">
                <p class="text-xs font-bold uppercase tracking-widest text-emerald-400">Winner Champion</p>
                <h2 id="winner-name" class="text-3xl font-black text-white">Player 1</h2>
                <p id="winner-sub" class="text-xs text-slate-400 pt-1">Won the match!</p>
            </div>
            <button onclick="resetToSetup()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black py-3.5 rounded-xl text-base shadow-lg transition">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <!-- SCRIPT LOGIC -->

        let startingScore = 501;
        let legsToWin = 3;
        let doubleOutRequired = true; // Default: Double Out
        let players = [];
        let activePlayerIdx = 0;
        let currentMultiplier = 1; // 1 = Single, 2 = Double, 3 = Triple
        let turnDarts = []; // Max 3 per turn
        let historyStack = []; // For global undo capability

        // Standard Checkout Dictionary for Double-Out finishes (170 down)

        // Initialize UI on load
        window.onload = function() {
            renderPlayerInputs(2);
        };

        // Double out toggle handler
        function toggleDoubleOut() {
            doubleOutRequired = !doubleOutRequired;
            const btn = document.getElementById('btn-double-out-toggle');
            const text = document.getElementById('double-out-text');
            const icon = document.getElementById('double-out-icon');

            if (doubleOutRequired) {
                btn.className = "w-full bg-emerald-500/20 border border-emerald-500/50 rounded-xl p-2.5 text-xs font-bold text-emerald-400 flex items-center justify-center h-[42px] transition hover:bg-emerald-500/30";
                text.innerText = "Double Out";
                icon.className = "fa-solid fa-check ml-1.5 text-xs";
            } else {
                btn.className = "w-full bg-slate-800 border border-slate-700 rounded-xl p-2.5 text-xs font-bold text-slate-300 flex items-center justify-center h-[42px] transition hover:bg-slate-700";
                text.innerText = "Single / Any Out";
                icon.className = "fa-solid fa-xmark ml-1.5 text-xs text-slate-400";
            }
        }

        // Preset score selection handler
        function setPresetScore(score, evt) {
            startingScore = score;
            const input = document.getElementById('custom-score-input');
            input.value = score;
            
            // Highlight active preset button state
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-500', 'text-slate-950');
                btn.classList.add('bg-slate-800', 'text-slate-200');
            });
            if (evt && evt.target) {
                evt.target.classList.remove('bg-slate-800', 'text-slate-200');
                evt.target.classList.add('bg-emerald-500', 'text-slate-950');
            }
        }

        function enableCustomScore() {
            const input = document.getElementById('custom-score-input');
            input.focus();
            input.select();
        }

        // Adjust player count
        function adjustPlayerCount(delta) {
            const countDisp = document.getElementById('player-count-display');
            let count = parseInt(countDisp.innerText) + delta;
            if (count < 1) count = 1;
            if (count > 6) count = 6;
            countDisp.innerText = count;
            renderPlayerInputs(count);
        }

        function renderPlayerInputs(count) {
            const container = document.getElementById('player-inputs-container');
            const currentVals = Array.from(container.querySelectorAll('input')).map(i => i.value);
            container.innerHTML = '';

            for (let i = 0; i < count; i++) {
                const name = currentVals[i] || `Player ${i + 1}`;
                const row = document.createElement('div');
                row.className = 'flex items-center space-x-2';
                row.innerHTML = `
                    <div class="w-7 h-7 rounded-lg bg-slate-800 flex items-center justify-center text-xs font-bold text-slate-400 shrink-0">
                        ${i + 1}
                    </div>
                    <input type="text" class="player-name-input w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm font-semibold text-slate-200 focus:outline-none focus:border-emerald-500"
                           placeholder="Player Name" value="${name}">
                `;
                container.appendChild(row);
            }
        }

        // Start Game
        function startGame() {
            const customScoreVal = parseInt(document.getElementById('custom-score-input').value);
            if (!customScoreVal || customScoreVal < 2) {
                alert("Please enter a valid starting score greater than 1.");
                return;
            }
            startingScore = customScoreVal;
            legsToWin = parseInt(document.getElementById('legs-to-win').value);

            const nameInputs = document.querySelectorAll('.player-name-input');
            players = Array.from(nameInputs).map((input, idx) => ({
                id: idx,
                name: input.value.trim() || `Player ${idx + 1}`,
                score: startingScore,
                legs: 0,
                totalDarts: 0,
                totalScored: 0,
                turnsCount: 0
            }));

            activePlayerIdx = 0;
            turnDarts = [];
            historyStack = [];

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('btn-stats').classList.remove('hidden');
            document.getElementById('btn-new-game').classList.remove('hidden');

            renderScoreboard();
            updateTurnDisplay();
        }

        // Multiplier management
        function setMultiplier(m) {
            currentMultiplier = m;
            document.querySelectorAll('.mod-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-500', 'text-slate-950');
                btn.classList.add('bg-slate-800', 'text-slate-300');
            });

            if (m === 1) {
                document.getElementById('mod-single').classList.replace('bg-slate-800', 'bg-emerald-500');
                document.getElementById('mod-single').classList.replace('text-slate-300', 'text-slate-950');
            } else if (m === 2) {
                document.getElementById('mod-double').classList.replace('bg-slate-800', 'bg-emerald-500');
                document.getElementById('mod-double').classList.replace('text-slate-300', 'text-slate-950');
            } else if (m === 3) {
                document.getElementById('mod-triple').classList.replace('bg-slate-800', 'bg-emerald-500');
                document.getElementById('mod-triple').classList.replace('text-slate-300', 'text-slate-950');
            }
        }

        // Enter score for standard numbers
        function enterDart(baseVal) {
            if (turnDarts.length >= 3) return;

            let score = baseVal * currentMultiplier;
            let label = `${baseVal}`;

            if (baseVal === 0) {
                label = '0';
                score = 0;
            } else if (currentMultiplier === 2) {
                label = `D${baseVal}`;
            } else if (currentMultiplier === 3) {
                label = `T${baseVal}`;
            }

            turnDarts.push({ baseVal, multiplier: currentMultiplier, score, label });
            
            // Reset multiplier back to Single after dart input
            setMultiplier(1);
            updateTurnDisplay();
        }

        // Enter Bullseye
        function enterBull(value) {
            if (turnDarts.length >= 3) return;

            let label = value === 50 ? 'BULL' : '25';
            turnDarts.push({ baseVal: value, multiplier: 1, score: value, label });
            setMultiplier(1);
            updateTurnDisplay();
        }

        // Undo single dart input
        function undoDart() {
            if (turnDarts.length > 0) {
                turnDarts.pop();
                updateTurnDisplay();
            } else if (historyStack.length > 0) {
                // Revert full last turn from state
                const lastState = historyStack.pop();
                players = lastState.players;
                activePlayerIdx = lastState.activePlayerIdx;
                turnDarts = lastState.turnDarts;
                renderScoreboard();
                updateTurnDisplay();
            }
        }

        // Update current turn UI slots
        function updateTurnDisplay() {
            let sum = 0;
            for (let i = 0; i < 3; i++) {
                const slot = document.getElementById(`dart-slot-${i}`);
                if (turnDarts[i]) {
                    slot.innerText = turnDarts[i].label;
                    slot.className = "w-12 h-10 rounded-lg bg-emerald-500/20 border border-emerald-500/40 flex items-center justify-center font-black text-sm text-emerald-400";
                    sum += turnDarts[i].score;
                } else {
                    slot.innerText = i === 0 ? '1st' : (i === 1 ? '2nd' : '3rd');
                    slot.className = "w-12 h-10 rounded-lg bg-slate-950 border border-slate-800 flex items-center justify-center font-extrabold text-sm text-slate-500";
                }
            }
            document.getElementById('turn-total').innerText = sum;
            updateCheckoutRoute(players[activePlayerIdx].score - sum);
        }

        // Checkout recommendation helper
        function updateCheckoutRoute(remainingScore) {
            const routeSpan = document.getElementById('checkout-route');

            if (!doubleOutRequired) {
                if (remainingScore === 0 && turnDarts.length > 0) {
                    routeSpan.innerText = "GAME SHOT!";
                    routeSpan.classList.add('animate-pulse');
                } else if (remainingScore > 0) {
                    routeSpan.innerText = `Leave ${remainingScore} (Single Out)`;
                    routeSpan.classList.remove('animate-pulse');
                } else {
                    routeSpan.innerText = "--";
                    routeSpan.classList.remove('animate-pulse');
                }
                return;
            }

            if (remainingScore > 1 && remainingScore <= 170 && CHECKOUTS[remainingScore]) {
                routeSpan.innerText = CHECKOUTS[remainingScore];
                routeSpan.classList.add('animate-pulse');
            } else if (remainingScore === 0 && turnDarts.length > 0) {
                const lastDart = turnDarts[turnDarts.length - 1];
                if (lastDart.multiplier === 2 || lastDart.score === 50) {
                    routeSpan.innerText = "GAME SHOT!";
                } else {
                    routeSpan.innerText = "NO DOUBLE (BUST)";
                }
            } else {
                routeSpan.innerText = "--";
                routeSpan.classList.remove('animate-pulse');
            }
        }

        // Submit Turn
        function submitTurn() {
            if (turnDarts.length === 0) return;

            // Save history snapshot for global undo
            historyStack.push({
                players: JSON.parse(JSON.stringify(players)),
                activePlayerIdx,
                turnDarts: [...turnDarts]
            });

            const p = players[activePlayerIdx];
            const turnSum = turnDarts.reduce((acc, d) => acc + d.score, 0);
            const remaining = p.score - turnSum;

            let isBust = false;

            if (doubleOutRequired) {
                // Double Out Rules Verification:
                // Must hit exactly 0, ending on a Double or Inner Bull (50)
                if (remaining < 0 || remaining === 1) {
                    isBust = true;
                } else if (remaining === 0) {
                    const lastDart = turnDarts[turnDarts.length - 1];
                    const isDoubleFinish = (lastDart.multiplier === 2) || (lastDart.score === 50);
                    if (!isDoubleFinish) {
                        isBust = true;
                    }
                }
            } else {
                // Single / Any Out Rules:
                // Must hit 0 or less is bust
                if (remaining < 0) {
                    isBust = true;
                }
            }

            if (isBust) {
                alert(`BUST! ${p.name} leaves ${p.score}.`);
                p.totalDarts += turnDarts.length;
                p.turnsCount += 1;
            } else {
                p.score = remaining;
                p.totalDarts += turnDarts.length;
                p.totalScored += turnSum;
                p.turnsCount += 1;

                if (p.score === 0) {
                    // Won the leg!
                    p.legs += 1;
                    if (p.legs >= legsToWin) {
                        showWinner(p);
                        return;
                    } else {
                        alert(`${p.name} WON THE LEG!`);
                        resetLeg();
                        return;
                    }
                }
            }

            // Next player turn
            turnDarts = [];
            activePlayerIdx = (activePlayerIdx + 1) % players.length;
            renderScoreboard();
            updateTurnDisplay();
        }

        // Render current player scoreboard cards
        function renderScoreboard() {
            const list = document.getElementById('scoreboard-list');
            list.innerHTML = '';

            players.forEach((p, idx) => {
                const isActive = idx === activePlayerIdx;
                const avg = p.turnsCount > 0 ? ((p.totalScored / p.totalDarts) * 3).toFixed(1) : "0.0";

                const card = document.createElement('div');
                card.className = `p-3.5 rounded-2xl border transition-all duration-200 flex items-center justify-between ${
                    isActive 
                    ? 'bg-slate-900 border-emerald-500/80 shadow-lg shadow-emerald-500/10 ring-1 ring-emerald-500/50' 
                    : 'bg-slate-900/50 border-slate-800 opacity-70'
                }`;

                card.innerHTML = `
                    <div class="space-y-0.5">
                        <div class="flex items-center space-x-2">
                            <span class="font-black text-base ${isActive ? 'text-emerald-400' : 'text-slate-300'}">${p.name}</span>
                            ${isActive ? '<span class="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></span>' : ''}
                        </div>
                        <div class="flex items-center space-x-3 text-xs text-slate-400">
                            <span>Legs: <strong class="text-slate-200">${p.legs}</strong></span>
                            <span>3-Dart Avg: <strong class="text-slate-200">${avg}</strong></span>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-black ${isActive ? 'text-white' : 'text-slate-400'}">${p.score}</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // Reset game for next leg
        function resetLeg() {
            players.forEach(p => p.score = startingScore);
            turnDarts = [];
            activePlayerIdx = 0;
            renderScoreboard();
            updateTurnDisplay();
        }

        // Show Winner modal
        function showWinner(player) {
            document.getElementById('winner-name').innerText = player.name;
            document.getElementById('winner-sub').innerText = `Won match ${player.legs} - legs!`;
            document.getElementById('winner-modal').classList.remove('hidden');
        }

        function resetToSetup() {
            document.getElementById('winner-modal').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('btn-stats').classList.add('hidden');
            document.getElementById('btn-new-game').classList.add('hidden');
        }

        function confirmResetGame() {
            if (confirm("Are you sure you want to reset this match?")) {
                resetToSetup();
            }
        }

        // Stats Modal Logic
        function toggleStatsModal() {
            const modal = document.getElementById('stats-modal');
            if (modal.classList.contains('hidden')) {
                renderStats();
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function renderStats() {
            const container = document.getElementById('stats-content');
            container.innerHTML = '';

            players.forEach(p => {
                const avg = p.totalDarts > 0 ? ((p.totalScored / p.totalDarts) * 3).toFixed(1) : "0.0";
                const block = document.createElement('div');
                block.className = "bg-slate-950 border border-slate-800 rounded-xl p-3 space-y-2";
                block.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-800/60 pb-1.5">
                        <span class="font-bold text-slate-200">${p.name}</span>
                        <span class="text-xs font-semibold text-emerald-400">${p.legs} Legs Won</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-center text-xs">
                        <div class="bg-slate-900 p-2 rounded-lg">
                            <div class="text-slate-500 font-medium">3-Dart Avg</div>
                            <div class="text-sm font-black text-slate-200">${avg}</div>
                        </div>
                        <div class="bg-slate-900 p-2 rounded-lg">
                            <div class="text-slate-500 font-medium">Total Darts</div>
                            <div class="text-sm font-black text-slate-200">${p.totalDarts}</div>
                        </div>
                        <div class="bg-slate-900 p-2 rounded-lg">
                            <div class="text-slate-500 font-medium">Points</div>
                            <div class="text-sm font-black text-slate-200">${p.totalScored}</div>
                        </div>
                    </div>
                `;
                container.appendChild(block);
            });
        }
    </script>
</body>
</html>
